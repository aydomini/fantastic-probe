name: 发布 Deb 包

on:
  push:
    tags:
      - 'v*.*.*'  # 匹配 v2.3.0, v2.3.1 等版本标签
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 releases 和上传文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置环境
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev lintian fakeroot

      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发时，从 version.json 读取版本号
            VERSION=$(jq -r '.version' version.json)
          else
            # 标签触发时，从标签名提取版本号
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "发布版本: $VERSION"

      - name: 验证版本号格式
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 错误: 版本号格式无效: $VERSION"
            echo "   版本号必须符合格式: X.Y.Z (如 2.3.0)"
            exit 1
          fi
          echo "✅ 版本号格式正确: $VERSION"

      - name: 更新版本号（如果需要）
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # 更新 build-deb.sh 中的版本号
          if [ -f "build-deb.sh" ]; then
            sed -i "s/VERSION=\".*\"/VERSION=\"$VERSION\"/" build-deb.sh
            echo "✅ 已更新 build-deb.sh 版本号"
          fi

          # 更新 debian/DEBIAN/control 中的版本号
          if [ -f "debian/DEBIAN/control" ]; then
            sed -i "s/Version: .*/Version: $VERSION/" debian/DEBIAN/control
            echo "✅ 已更新 debian/DEBIAN/control 版本号"
          fi

      - name: 构建 Deb 包
        run: |
          if [ ! -f "build-deb.sh" ]; then
            echo "❌ 错误: 未找到 build-deb.sh 脚本"
            exit 1
          fi

          chmod +x build-deb.sh
          # 使用 fakeroot 确保文件所有权为 root:root
          fakeroot ./build-deb.sh

      - name: 验证 Deb 包
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEB_FILE="build/fantastic-probe_${VERSION}_all.deb"

          if [ ! -f "$DEB_FILE" ]; then
            echo "❌ 错误: Deb 包未生成: $DEB_FILE"
            exit 1
          fi

          echo "📦 Deb 包信息:"
          dpkg-deb -I "$DEB_FILE"

          echo ""
          echo "📋 包内容:"
          dpkg-deb -c "$DEB_FILE"

          echo ""
          echo "✅ Deb 包验证通过"

      - name: 生成校验和
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd build
          sha256sum "fantastic-probe_${VERSION}_all.deb" > "fantastic-probe_${VERSION}_all.deb.sha256"
          echo "✅ SHA256 校验和已生成:"
          cat "fantastic-probe_${VERSION}_all.deb.sha256"

      - name: 准备发布说明
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # 从 version.json 读取更新日志（如果存在）
          if [ -f "version.json" ]; then
            CHANGELOG=$(jq -r '.changelog // "请参阅 README.md 中的版本历史部分"' version.json)
          else
            CHANGELOG="请参阅 README.md 中的版本历史部分"
          fi

          # 创建发布说明
          cat > release_notes.md <<EOF
          ## Fantastic-Probe v${VERSION}

          ### 📦 安装方式

          **Debian/Ubuntu 用户**：
          \`\`\`bash
          # 下载 deb 包
          wget https://github.com/aydomini/fantastic-probe/releases/download/v${VERSION}/fantastic-probe_${VERSION}_all.deb

          # 安装
          sudo apt install ./fantastic-probe_${VERSION}_all.deb
          \`\`\`

          **其他 Linux 发行版（一键安装）**：
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/aydomini/fantastic-probe/main/install.sh | sudo bash
          \`\`\`

          ### 🔐 校验和验证

          \`\`\`bash
          # 下载校验和文件
          wget https://github.com/aydomini/fantastic-probe/releases/download/v${VERSION}/fantastic-probe_${VERSION}_all.deb.sha256

          # 验证文件完整性
          sha256sum -c fantastic-probe_${VERSION}_all.deb.sha256
          \`\`\`

          ### 📝 更新日志

          ${CHANGELOG}

          ### 📚 文档

          完整文档请访问：[README.md](https://github.com/aydomini/fantastic-probe/blob/main/README.md)

          ---

          **项目**：Fantastic-Probe
          **作者**：aydomini
          **仓库**：https://github.com/aydomini/fantastic-probe
          EOF

          echo "✅ 发布说明已准备完毕"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/fantastic-probe_${{ steps.version.outputs.VERSION }}_all.deb
            build/fantastic-probe_${{ steps.version.outputs.VERSION }}_all.deb.sha256
          body_path: release_notes.md
          draft: false
          prerelease: false
          tag_name: v${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布成功提示
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  ✅ Fantastic-Probe v${VERSION} 发布成功！     ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Deb 包已上传到:"
          echo "   https://github.com/aydomini/fantastic-probe/releases/tag/v${VERSION}"
          echo ""
          echo "🎉 用户现在可以通过以下方式安装:"
          echo "   wget https://github.com/aydomini/fantastic-probe/releases/download/v${VERSION}/fantastic-probe_${VERSION}_all.deb"
          echo "   sudo apt install ./fantastic-probe_${VERSION}_all.deb"
